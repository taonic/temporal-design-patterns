# fly.toml — bundles the VitePress static site and the sandbox-runner Express API.
# Set the DAYTONA_KEY secret before deploying:
#   fly secrets set DAYTONA_KEY=...

app = "temporal-design-patterns"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  DOCS_DIST_DIR = "/app/docs-dist"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
